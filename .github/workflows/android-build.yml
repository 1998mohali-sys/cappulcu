name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Create Android project if missing
      run: |
        if [ ! -f "src/android/gradlew" ]; then
          mkdir -p src/android
          cd src/android
          gradle init --type basic
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0"
        fi
        
    - name: Build APK
      working-directory: ./src/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cappulcu-apk
        path: src/android/app/build/outputs/apk/debug/app-debug.apk
